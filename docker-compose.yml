services:
  db:
    image: postgres:15-alpine
    container_name: fleetcontrol_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleetuser
      POSTGRES_PASSWORD: fleetpass
      POSTGRES_DB: fleetcontrol
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetuser -d fleetcontrol"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetcontrol_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: fleetuser
      DB_PASSWORD: fleetpass
      DB_NAME: fleetcontrol
      JWT_SECRET: supersecretjwtkey2024fleetcontrol
      JWT_EXPIRES_IN: 8h
      # Cloudflare R2
      R2_ENDPOINT: https://80b3081dfcda42b43a68695299c27109.r2.cloudflarestorage.com
      R2_ACCESS_KEY_ID: f54dd7bd59e05e0d6cd01a4769bbfcc3
      R2_SECRET_ACCESS_KEY: 424b0971a1132bf8b71a090ca7804f405a81728417f410a829dcfacb1b7fe991
      R2_BUCKET: fleetcontrol-fotos
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:4000/api
    container_name: fleetcontrol_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
